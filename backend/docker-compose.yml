services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghostbounty
      POSTGRES_PASSWORD: ghostbounty
      POSTGRES_DB: ghostbounty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostbounty"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://ghostbounty:ghostbounty@db:5432/ghostbounty
      RPC_URL: ${RPC_URL}
      WS_RPC_URL: ${WS_RPC_URL:-}
      CONTRACT_ADDRESS: "0x15eF2AF4A8553f49c19C397788c4d5a7e2220a59"
      DEPLOY_BLOCK: "10438838"
      PORT: "3001"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
